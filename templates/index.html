<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Combat Car Simulator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Arial;
background:
radial-gradient(circle at top,
#0ea5e9,
#020617 45%,
#000000 100%);
}

/* HUD */

#hud{

position:absolute;

top:20px;

left:20px;

z-index:100;

padding:18px 24px;

background:rgba(0,0,0,0.45);

border:1px solid rgba(0,255,255,0.35);

border-radius:18px;

backdrop-filter:blur(12px);

color:#7DF9FF;

box-shadow:
0 0 25px rgba(0,255,255,0.25);

}

#title{

font-size:28px;

font-weight:bold;

margin-bottom:10px;

}

.info{

font-size:18px;

margin-top:6px;

}

/* GAME STATUS */

#gameover{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

font-size:70px;

font-weight:bold;

display:none;

z-index:999;

text-shadow:
0 0 20px currentColor;

}

/* MOBILE CONTROLS */

#mobileControls{

position:fixed;

bottom:20px;

width:100%;

display:flex;

justify-content:center;

gap:12px;

z-index:9999;

flex-wrap:wrap;

}

#mobileControls button{

width:65px;

height:65px;

border:none;

border-radius:50%;

background:rgba(0,255,255,0.18);

backdrop-filter:blur(10px);

color:white;

font-size:24px;

font-weight:bold;

box-shadow:0 0 15px cyan;

}

canvas{
display:block;
}

@media(min-width:900px){

#mobileControls{

display:none;

}

}

</style>

</head>

<body>

<div id="hud">

<div id="title">
AI COMBAT SIMULATOR
</div>

<div class="info">
SPEED:
<span id="speed">0</span>
</div>

<div class="info">
POINTS:
<span id="points">0</span>
</div>

<div class="info">
F = SHOOT
</div>

<div class="info">
SPACE = JUMP
</div>

</div>

<div id="gameover">
GAME OVER
</div>

<!-- MOBILE CONTROLS -->

<div id="mobileControls">

<button id="leftBtn">◀</button>
<button id="rightBtn">▶</button>
<button id="accBtn">▲</button>
<button id="brakeBtn">▼</button>
<button id="jumpBtn">⤒</button>
<button id="shootBtn">✦</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ======================
// SCENE
// ======================

const scene = new THREE.Scene();

scene.fog =
new THREE.Fog(
0x000000,
20,
400
);

// ======================
// CAMERA
// ======================

const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
3000
);

camera.position.set(0,6,12);

// ======================
// RENDERER
// ======================

const renderer =
new THREE.WebGLRenderer({

antialias:true

});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.shadowMap.enabled = true;

renderer.setPixelRatio(
window.devicePixelRatio
);

document.body.appendChild(
renderer.domElement
);

// ======================
// LIGHTS
// ======================

scene.add(
new THREE.AmbientLight(
0xffffff,
0.7
)
);

const light =
new THREE.DirectionalLight(
0xffffff,
1.5
);

light.position.set(
20,
30,
10
);

scene.add(light);

// ======================
// ROAD
// ======================

const road =
new THREE.Mesh(

new THREE.PlaneGeometry(
5000,
26
),

new THREE.MeshStandardMaterial({

color:0x111827

})

);

road.rotation.x = -Math.PI/2;

scene.add(road);

// ======================
// ROAD LINES
// ======================

for(let i=0;i>-5000;i-=12){

const line =
new THREE.Mesh(

new THREE.BoxGeometry(
0.5,
0.02,
5
),

new THREE.MeshBasicMaterial({
color:0xffffff
})

);

line.position.set(
0,
0.02,
i
);

scene.add(line);

}

// ======================
// SIDE WALLS
// ======================

function barrier(x){

const wall =
new THREE.Mesh(

new THREE.BoxGeometry(
1,
2,
5000
),

new THREE.MeshStandardMaterial({

color:0x00F5FF,

emissive:0x00F5FF,

emissiveIntensity:0.6

})

);

wall.position.set(
x,
1,
-2400
);

scene.add(wall);

}

barrier(-13);
barrier(13);

// ======================
// BUILDINGS
// ======================

function createBuilding(x,z){

const h =
10 + Math.random()*30;

const b =
new THREE.Mesh(

new THREE.BoxGeometry(
8,
h,
8
),

new THREE.MeshStandardMaterial({

color:0x0f172a,

metalness:0.5,

roughness:0.4

})

);

b.position.set(
x,
h/2,
z
);

scene.add(b);

}

for(let z=0;z>-4500;z-=80){

createBuilding(
-30 - Math.random()*10,
z
);

createBuilding(
30 + Math.random()*10,
z
);

}
// ======================
// SIDE CONSTRUCTIONS
// ======================

function createConstruction(x,z){

// BASE

const base =
new THREE.Mesh(

new THREE.BoxGeometry(
10,
5,
10
),

new THREE.MeshStandardMaterial({

color:0xff8800,

metalness:0.4,

roughness:0.6

})

);

base.position.set(
x,
2.5,
z
);

scene.add(base);

// CRANE POLE

const pole =
new THREE.Mesh(

new THREE.BoxGeometry(
0.8,
18,
0.8
),

new THREE.MeshStandardMaterial({

color:0xffff00,

metalness:0.7

})

);

pole.position.set(
x,
14,
z
);

scene.add(pole);

// CRANE ARM

const arm =
new THREE.Mesh(

new THREE.BoxGeometry(
12,
0.5,
0.5
),

new THREE.MeshStandardMaterial({

color:0xffff00

})

);

arm.position.set(
x + 6,
22,
z
);

scene.add(arm);

// WARNING LIGHT

const warning =
new THREE.PointLight(
0xff2200,
2,
40
);

warning.position.set(
x,
24,
z
);

scene.add(warning);

}

// ======================
// GENERATE CITY + CONSTRUCTIONS
// ======================

for(let z=0; z>-4500; z-=90){

// LEFT SIDE

if(Math.random()>0.45){

createBuilding(
-30 - Math.random()*12,
z
);

}else{

createConstruction(
-32 - Math.random()*10,
z
);

}

// RIGHT SIDE

if(Math.random()>0.45){

createBuilding(
30 + Math.random()*12,
z
);

}else{

createConstruction(
32 + Math.random()*10,
z
);

}

}
// ======================
// SPEED BREAKERS
// ======================

const breakers = [];

function createBreaker(z){

const breaker =
new THREE.Mesh(

new THREE.BoxGeometry(
12,
1,
4
),

new THREE.MeshStandardMaterial({

color:0xff5500,

emissive:0xff2200,

emissiveIntensity:1

})

);

breaker.position.set(
0,
0.5,
z
);

scene.add(breaker);

breakers.push(breaker);

}

createBreaker(-150);
createBreaker(-450);
createBreaker(-850);
createBreaker(-1200);
createBreaker(-1800);

// ======================
// FINISH LINE
// ======================

const finish =
new THREE.Mesh(

new THREE.BoxGeometry(
26,
8,
2
),

new THREE.MeshStandardMaterial({

color:0x00ffcc,

emissive:0x00ffcc,

emissiveIntensity:1

})

);

finish.position.set(
0,
4,
-4500
);

scene.add(finish);

// ======================
// CAR
// ======================

const car = new THREE.Group();

const body =
new THREE.Mesh(

new THREE.BoxGeometry(
2.5,
1,
5
),

new THREE.MeshPhysicalMaterial({

color:0xff0055,

emissive:0xff0055,

emissiveIntensity:0.4,

metalness:1,

roughness:0.08,

clearcoat:1

})

);

car.add(body);

const topCar =
new THREE.Mesh(

new THREE.BoxGeometry(
1.6,
0.7,
2.3
),

new THREE.MeshStandardMaterial({
color:0x111111
})

);

topCar.position.y = 0.9;

car.add(topCar);

// WHEELS

function wheel(x,z){

const w =
new THREE.Mesh(

new THREE.CylinderGeometry(
1,
1,
1,
32
),

new THREE.MeshStandardMaterial({
color:0x2AED23
})

);

w.rotation.z = Math.PI/2;

w.position.set(
x,
-0.6,
z
);

car.add(w);

}

wheel(-1.3,1.8);
wheel(1.3,1.8);
wheel(-1.3,-1.8);
wheel(1.3,-1.8);

scene.add(car);

// ======================
// BULLETS
// ======================

const bullets = [];

function shootBullet(){

const bullet =
new THREE.Mesh(

new THREE.SphereGeometry(
0.18,
16,
16
),

new THREE.MeshBasicMaterial({
color:0x00F5FF
})

);

bullet.position.copy(car.position);

bullet.position.y += 0.5;

bullet.userData.velocity =
new THREE.Vector3(

Math.sin(car.rotation.y)*2,

0,

Math.cos(car.rotation.y)*2

);

scene.add(bullet);

bullets.push(bullet);

}

// ======================
// COINS
// ======================

const coins = [];

function createCoin(){

const coin =
new THREE.Mesh(

new THREE.CylinderGeometry(
0.5,
0.5,
0.15,
32
),

new THREE.MeshStandardMaterial({

color:0xffd700,

emissive:0xffd700,

emissiveIntensity:1

})

);

coin.rotation.x = Math.PI/2;

coin.position.set(

(Math.random()*20)-10,

1,

-300 - Math.random()*4000

);

scene.add(coin);

coins.push(coin);

}

for(let i=0;i<70;i++){

createCoin();

}

// ======================
// ROCKS
// ======================

const rocks = [];

function createRock(){

const rock =
new THREE.Mesh(

new THREE.DodecahedronGeometry(
1
),

new THREE.MeshStandardMaterial({
color:0x666666
})

);

rock.position.set(

(Math.random()*20)-10,

1,

-300 - Math.random()*4000

);

scene.add(rock);

rocks.push(rock);

}

for(let i=0;i<50;i++){

createRock();

}

// ======================
// PEDESTRIANS
// ======================

const pedestrians = [];

function createPedestrian(){

const p =
new THREE.Mesh(

new THREE.BoxGeometry(
1,
2,
1
),

new THREE.MeshStandardMaterial({
color:0x00ff88
})

);

p.position.set(

(Math.random()*16)-8,

1,

-500 - Math.random()*4000

);

p.userData.dir =
Math.random()>0.5 ? 1 : -1;

scene.add(p);

pedestrians.push(p);

}

for(let i=0;i<20;i++){

createPedestrian();

}

// ======================
// CONTROLS
// ======================

let speed = 0;

let points = 0;

let gameOver = false;

let velocityY = 0;

let isJumping = false;

let gameFinished = false;

const keys = {};

window.addEventListener(
'keydown',
(e)=>{

keys[e.key]=true;

if(e.key.toLowerCase()==='f'){

shootBullet();

}

}
);

window.addEventListener(
'keyup',
(e)=>{

keys[e.key]=false;

}
);

// ======================
// MOBILE CONTROLS
// ======================

const mobile = {

left:false,
right:false,
up:false,
down:false

};

function hold(btn,key){

btn.addEventListener(
'touchstart',
(e)=>{

e.preventDefault();

mobile[key]=true;

}
);

btn.addEventListener(
'touchend',
(e)=>{

e.preventDefault();

mobile[key]=false;

}
);

}

hold(leftBtn,'left');
hold(rightBtn,'right');
hold(accBtn,'up');
hold(brakeBtn,'down');

jumpBtn.addEventListener(
'touchstart',
()=>{

if(!isJumping){

velocityY = 0.28;

isJumping = true;

}

}
);

shootBtn.addEventListener(
'touchstart',
()=>{

shootBullet();

}
);

// ======================
// COLLISION
// ======================

function collide(a,b,d){

return a.position.distanceTo(
b.position
) < d;

}

// ======================
// ANIMATION
// ======================

function animate(){

requestAnimationFrame(
animate
);

if(gameOver){

renderer.render(scene,camera);

return;

}

// ACCELERATION

if(keys['ArrowUp'] || mobile.up){

speed -= 0.015;

}

if(keys['ArrowDown'] || mobile.down){

speed += 0.015;

}

// TURN

if(keys['ArrowLeft'] || mobile.left){

car.rotation.y += 0.04;

}

if(keys['ArrowRight'] || mobile.right){

car.rotation.y -= 0.04;

}

// JUMP

if(keys[' '] && !isJumping){

velocityY = 0.28;

isJumping = true;

}

// GRAVITY

velocityY -= 0.012;

car.position.y += velocityY;

if(car.position.y <= 0){

car.position.y = 0;

velocityY = 0;

isJumping = false;

}

// SPEED BREAKER JUMP

breakers.forEach((breaker)=>{

const dz =
Math.abs(
car.position.z -
breaker.position.z
);

const dx =
Math.abs(
car.position.x -
breaker.position.x
);

// SMOOTH SPEED BREAKER JUMP

if(

dz < 4 &&
dx < 5 &&
!isJumping

){

// SOFT UPWARD FORCE

velocityY = 0.28;

// SMOOTH FORWARD MOTION

bounceForce = 0.045;

isJumping = true;

}

// SMOOTH PROJECTILE MOTION

if(isJumping){

// GRAVITY

velocityY -= 0.010;

// VERTICAL MOVEMENT

car.position.y += velocityY;

// FORWARD AIR GLIDE

car.position.z +=
Math.cos(car.rotation.y)
* bounceForce;

car.position.x +=
Math.sin(car.rotation.y)
* bounceForce;

// SMOOTH CAR TILT

car.rotation.x =
THREE.MathUtils.lerp(
car.rotation.x,
-velocityY * 1.2,
0.08
);

}

// SMOOTH LANDING

if(car.position.y <= 0){

car.position.y = 0;

velocityY = 0;

bounceForce = 0;

isJumping = false;

// RESET ROTATION SMOOTHLY

car.rotation.x =
THREE.MathUtils.lerp(
car.rotation.x,
0,
0.15
);

}

});
function wheel(x,z){

const w =
new THREE.Mesh(

new THREE.CylinderGeometry(
0.5,
0.5,
0.6,
32
),

new THREE.MeshPhysicalMaterial({

color:0x00FFF,          // TIRE COLOR

emissive:0x00F5FF,       // GLOW

emissiveIntensity:0.35,

metalness:1,

roughness:0.25,

clearcoat:1

})

);

w.rotation.z = Math.PI/2;

w.position.set(
x,
-0.6,
z
);

// OPTIONAL GLOW EFFECT

const tireGlow =
new THREE.PointLight(
0x00F5FF,
0.6,
8
);

tireGlow.position.set(
x,
-0.6,
z
);

car.add(tireGlow);

car.add(w);

}
// FRICTION

speed *= 0.985;

// MOVE

car.position.x +=
Math.sin(car.rotation.y)
* speed;

car.position.z +=
Math.cos(car.rotation.y)
* speed;

// LIMITS

if(car.position.x > 11){

car.position.x = 11;

}

if(car.position.x < -11){

car.position.x = -11;

}

// CAMERA

camera.position.x =
car.position.x;

camera.position.y =
car.position.y + 6;

camera.position.z =
car.position.z + 12;

camera.lookAt(car.position);

// FINISH LINE

if(car.position.z <= -4480 && !gameFinished){

gameFinished = true;

speed = 0;

gameOver = true;

document.getElementById(
'gameover'
).innerHTML = 'MISSION COMPLETE';

document.getElementById(
'gameover'
).style.display='block';

document.getElementById(
'gameover'
).style.color='#00ffcc';

}

// SPEED DISPLAY

document.getElementById(
'speed'
).innerText =
Math.abs(speed*500).toFixed(0);

// BULLETS

bullets.forEach((bullet,bIndex)=>{

bullet.position.add(
bullet.userData.velocity
);

// ROCK HIT

rocks.forEach((rock,rIndex)=>{

if(collide(bullet,rock,1.5)){

scene.remove(rock);

rocks.splice(rIndex,1);

scene.remove(bullet);

bullets.splice(bIndex,1);

points += 20;

}

});

// PEDESTRIAN HIT

pedestrians.forEach((p,pIndex)=>{

if(collide(bullet,p,1.5)){

scene.remove(p);

pedestrians.splice(pIndex,1);

scene.remove(bullet);

bullets.splice(bIndex,1);

points += 30;

}

});

});

// COINS

coins.forEach((coin)=>{

coin.rotation.z += 0.05;

if(collide(car,coin,2)){

points += 10;

coin.position.z =
car.position.z - 500 - Math.random()*1500;

coin.position.x =
(Math.random()*20)-10;

}

});

document.getElementById(
'points'
).innerText = points;

// ROCK COLLISION

rocks.forEach((rock)=>{

if(collide(car,rock,2)){

gameOver = true;

document.getElementById(
'gameover'
).style.display='block';

document.getElementById(
'gameover'
).style.color='red';

}

});

// PEDESTRIANS

pedestrians.forEach((p)=>{

p.position.x +=
0.05 * p.userData.dir;

if(p.position.x > 9){

p.userData.dir = -1;

}

if(p.position.x < -9){

p.userData.dir = 1;

}

if(collide(car,p,2)){

gameOver = true;

document.getElementById(
'gameover'
).style.display='block';

}

});

// RENDER

renderer.render(
scene,
camera
);

}

animate();

// ======================
// RESIZE
// ======================

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
